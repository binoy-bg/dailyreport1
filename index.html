<!DOCTYPE html>
<html>
<head>
  <title>Daily Report Tool</title>

  <style>
    body {
      font-family: Arial;
      background: #87c7d8;
      padding: 20px;
    }

    .container {
      max-width: 400px;
      margin: auto;
    }

    label {
      display: block;
      margin-top: 15px;
      font-size: 18px;
    }

    input, select, textarea {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
      border: 1px solid #ccc;
    }

    .radio-group {
      margin-top: 10px;
    }

    .radio-group.error {
      border: 2px solid red;
      padding: 5px;
    }

    button {
      margin-top: 10px;
      padding: 10px;
      font-size: 14px;
      cursor: pointer;
    }

    .copy-btn {
      width: 100%;
      background: black;
      color: white;
      border: none;
    }

    .clear-btn {
      width: 100%;
      background: gray;
      color: white;
      border: none;
    }

    .issueRow {
      display: flex;
      gap: 5px;
      margin-top: 5px;
    }

    .issueInput {
      flex: 1;
    }

    .removeBtn {
      background: red;
      color: white;
      border: none;
      padding: 5px 8px;
      cursor: pointer;
    }

    .hidden {
      display: none;
    }

    .error {
      border: 2px solid red !important;
    }
  </style>
</head>

<body>

<div class="container">

  <label>Date:</label>
  <input type="date" id="date">

  <label>Line:</label>
  <select id="line">
    <option>CKD Packing Line</option>
    <option>SKD Packing Line</option>
    <option>A03-GF Packing Line</option>
  </select>

  <label>Shift:</label>
  <div class="radio-group">
    <input type="radio" name="shift" value="AS"> AS
    <input type="radio" name="shift" value="BS"> BS
    <input type="radio" name="shift" value="CS"> CS
  </div>

  <label>COS OQC:</label>
  <input type="number" id="cos" oninput="generateIssues('cos','cosIssues')">
  <div id="cosIssues"></div>

  <label>OBA 1:</label>
  <input type="number" id="oba1" oninput="generateIssues('oba1','oba1Issues')">
  <div id="oba1Issues"></div>

  <label>OBA 2:</label>
  <input type="number" id="oba2" oninput="generateIssues('oba2','oba2Issues')">
  <div id="oba2Issues"></div>

  <!-- ✅ NOTE MOVED HERE -->
  <label><input type="checkbox" id="noteToggle" onclick="toggleNote()"> Add Note</label>
  <textarea id="note" class="hidden" placeholder="Enter note..."></textarea>

  <label><input type="checkbox" id="report"> Reports Shared</label>
  <label><input type="checkbox" id="repair"> Repair Check-in</label>

  <label>Name:</label>
  <input type="text" id="name">

  <button class="copy-btn" onclick="copyData()">Copy</button>
  <button class="clear-btn" onclick="clearForm()">Clear</button>

</div>

<script>

function toggleNote() {
  document.getElementById("note").classList.toggle("hidden");
}

function formatDate(d) {
  let p = d.split("-");
  return `${p[2]}/${p[1]}/${p[0]}`;
}

function generateIssues(id, cid) {
  let v = parseInt(document.getElementById(id).value) || 0;
  let c = document.getElementById(cid);
  c.innerHTML = "";

  for (let i = 0; i < v; i++) {
    let r = document.createElement("div");
    r.className = "issueRow";

    let inp = document.createElement("input");
    inp.className = "issueInput";
    inp.placeholder = "Issue";

    let btn = document.createElement("button");
    btn.innerText = "❌";
    btn.className = "removeBtn";
    btn.onclick = () => r.remove();

    r.appendChild(inp);
    r.appendChild(btn);
    c.appendChild(r);
  }
}

function getShift() {
  let s = document.getElementsByName("shift");
  for (let i = 0; i < s.length; i++) if (s[i].checked) return s[i].value;
  return "";
}

function validateIssues(id, count) {
  let rows = document.getElementById(id).children;
  let valid = true;

  if (count >= 1) {
    for (let i = 0; i < rows.length; i++) {
      let inp = rows[i].querySelector("input");
      if (!inp.value.trim()) {
        inp.classList.add("error");
        valid = false;
      }
    }
  }
  return valid;
}

function clearErrors() {
  let e = document.querySelectorAll(".error");
  for (let i = 0; i < e.length; i++) e[i].classList.remove("error");
}

function formatIssues(label, count, id) {
  let rows = document.getElementById(id).children;
  let suffix = label === "COS OQC" ? " Fail" : " NG";

  let t = `■ *${label}:* ${count}x${suffix}`;
  for (let i = 0; i < rows.length; i++) {
    t += `\n    • ${rows[i].querySelector("input").value}`;
  }
  return t;
}

function copyData() {

  clearErrors();
  let valid = true;

  let date = document.getElementById("date");
  let shift = getShift();
  let name = document.getElementById("name");

  let cos = document.getElementById("cos").value;
  let oba1 = document.getElementById("oba1").value;
  let oba2 = document.getElementById("oba2").value;

  if (!date.value) { date.classList.add("error"); valid = false; }
  if (!shift) { document.querySelector(".radio-group").classList.add("error"); valid = false; }
  if (!name.value.trim()) { name.classList.add("error"); valid = false; }

  if (!validateIssues("cosIssues", cos)) valid = false;
  if (!validateIssues("oba1Issues", oba1)) valid = false;
  if (!validateIssues("oba2Issues", oba2)) valid = false;

  if (!valid) return;

  let out = [];

  out.push(`Date: *${formatDate(date.value)}*`);
  out.push(`Line: *${line.value}*`);
  out.push(`Shift: *${shift}*`);

  out.push("");
  out.push(formatIssues("COS OQC", cos, "cosIssues"));

  out.push("");
  out.push(formatIssues("OBA 1", oba1, "oba1Issues"));

  out.push("");
  out.push(formatIssues("OBA 2", oba2, "oba2Issues"));

  let note = document.getElementById("note");
  if (!note.classList.contains("hidden") && note.value.trim()) {
    out.push("");
    out.push(`*Note:* ${note.value}`);
  }

  if (report.checked) {
    out.push("");
    out.push("*Reports Shared:* Done");
  }

  if (repair.checked) {
    out.push("*Repair check-in:* Done");
  }

  out.push("");
  out.push("Regards,");
  out.push(`*${name.value}*`);

  navigator.clipboard.writeText(out.join("\n"));
  alert("Copied!");
}

function clearForm() {
  document.querySelectorAll("input").forEach(i => i.value = "");
  document.querySelectorAll("input[type=radio],input[type=checkbox]").forEach(i => i.checked = false);

  cosIssues.innerHTML = "";
  oba1Issues.innerHTML = "";
  oba2Issues.innerHTML = "";

  note.value = "";
  note.classList.add("hidden");

  clearErrors();
}

</script>

</body>
</html>
